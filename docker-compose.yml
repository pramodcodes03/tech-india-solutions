services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    image: erp-app:dev
    container_name: erp_app
    restart: unless-stopped
    working_dir: /var/www/html
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
    volumes:
      - ./:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - erp

  nginx:
    image: nginx:1.27-alpine
    container_name: erp_nginx
    restart: unless-stopped
    ports:
      - "8081:80"
    volumes:
      - ./:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - erp

  mysql:
    image: mysql:8.0
    container_name: erp_mysql
    restart: unless-stopped
    ports:
      - "3308:3306"
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-erp}
      MYSQL_USER: ${DB_USERNAME:-erp}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootsecret}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf:ro
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$$MYSQL_ROOT_PASSWORD" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - erp

  redis:
    image: redis:7.4-alpine
    container_name: erp_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - erp

  node:
    image: node:20-alpine
    container_name: erp_node
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    ports:
      - "5173:5173" # Vite dev server (for hot reload)
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    networks:
      - erp

volumes:
  mysql_data:
  redis_data:

networks:
  erp:
    driver: bridge
