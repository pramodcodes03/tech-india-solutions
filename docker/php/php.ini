display_errors = Off
display_startup_errors = Off
log_errors = On
error_log = /proc/self/fd/2

memory_limit = 512M
max_execution_time = 120
max_input_time = 120
post_max_size = 50M
upload_max_filesize = 50M
max_input_vars = 5000

date.timezone = "Asia/Kolkata"

realpath_cache_size = 4096K
realpath_cache_ttl = 600

expose_php = Off