# Production compose file.
# Run with: docker compose -f docker-compose.prod.yml up -d

services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: production
    image: erp-app:prod
    container_name: erp_app
    restart: always
    working_dir: /var/www/html
    env_file:
      - .env
    environment:
      CONTAINER_ROLE: app
    volumes:
      - app_storage:/var/www/html/storage
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - erp

  nginx:
    image: nginx:1.27-alpine
    container_name: erp_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
      - app_public:/var/www/html/public:ro
      - app_storage:/var/www/html/storage:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      - app
    networks:
      - erp

  mysql:
    image: mysql:8.0
    container_name: erp_mysql
    restart: always
    # Note: NO ports section — MySQL is reachable only inside Docker network
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf:ro
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - erp

  redis:
    image: redis:7.4-alpine
    container_name: erp_redis
    restart: always
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - erp

  queue:
    image: erp-app:prod
    container_name: erp_queue
    restart: always
    command: supervisord -n -c /etc/supervisor/conf.d/supervisord.conf
    env_file:
      - .env
    environment:
      CONTAINER_ROLE: queue
    volumes:
      - app_storage:/var/www/html/storage
    depends_on:
      - app
      - redis
    networks:
      - erp

  scheduler:
    image: erp-app:prod
    container_name: erp_scheduler
    restart: always
    command: >
      sh -c "while true; do
        php artisan schedule:run --verbose --no-interaction;
        sleep 60;
      done"
    env_file:
      - .env
    environment:
      CONTAINER_ROLE: scheduler
    volumes:
      - app_storage:/var/www/html/storage
    depends_on:
      - app
    networks:
      - erp

volumes:
  mysql_data:
  redis_data:
  app_storage:
  app_public:

networks:
  erp:
    driver: bridge
